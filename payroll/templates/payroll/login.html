{% block content %}
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    .login-container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        outline: 2px solid #000000;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h1 {
        color: #2563eb;
        font-size: 2rem;
        margin-bottom: 10px;
    }

    .login-header p {
        color: #6b7280;
        font-size: 0.95rem;
    }

    .alert-error {
        background: #fee2e2;
        color: #b91c1c;
        padding: 12px;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 20px;
        border: 1px solid #fecaca;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #374151;
    }

    .input-group input {
        width: 100%;
        padding: 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    .input-group input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .login-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 14px;
    }

    .login-options a {
        color: #2563eb;
        text-decoration: none;
    }

    .login-options a:hover {
        text-decoration: underline;
    }

    .login-btn {
        width: 100%;
        padding: 14px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .login-btn:hover {
        transform: translateY(-2px);
    }

    .login-btn:active {
        transform: translateY(0);
    }
</style>

<div class="login-container">
    <div class="login-card">

        <div class="login-header">
            <h1>Payroll System</h1>
            <p>Sign in to your account</p>
        </div>

        {% if form.errors %}
            <div class="alert-error">
                Invalid username or password.
            </div>
        {% endif %}

        <form method="post" action="{% url 'payroll:login' %}">
            {% csrf_token %}

            <div class="input-group">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>

            <div class="input-group">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>

            <div class="login-options">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
                Sign In
            </button>
        </form>

    </div>
</div>
{% endblock %}
