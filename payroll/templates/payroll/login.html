{% extends 'payroll/base.html' %}

{% block content %}
<div class="panel login-panel">
    <h1>Login</h1>
    {% if form.errors %}
        <div class="alert alert-error">Please correct the fields below.</div>
    {% endif %}
    <form method="post" action="{% url 'payroll:login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Password:</label>
            {{ form.password }}
        </div>
        <button type="submit" class="button">Sign In</button>
    </form>
</div>
{% endblock %}
